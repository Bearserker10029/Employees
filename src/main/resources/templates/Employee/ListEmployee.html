<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Lista de Empleados</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>

<body>
    <main>
        <div class="container px-4 py-5">
            <h1 class="pb-2 border-bottom">Lista de Empleados</h1>
            <form method="get" th:action="@{/employee/list}">
                <div class="row g-2 mb-3">
                    <div class="col-md-3">
                        <select name="campo" class="form-select">
                            <option value="firstName" th:selected="${selectedCampo == 'firstName'}">Nombre</option>
                            <option value="lastName" th:selected="${selectedCampo == 'lastName'}">Apellido</option>
                            <option value="jobTitle" th:selected="${selectedCampo == 'jobTitle'}">Puesto</option>
                            <option value="departmentName" th:selected="${selectedCampo == 'departmentName'}">
                                Departamento</option>
                            <option value="city" th:selected="${selectedCampo == 'city'}">Ciudad</option>
                        </select>
                    </div>
                    <div class="col-md-7">
                        <input name="termino" class="form-control" type="text" placeholder="Buscar"
                            th:value="${termino}">
                    </div>
                    <div class="col-md-2 d-grid">
                        <button class="btn btn-primary" type="submit">Buscar</button>
                    </div>
                </div>
            </form>

            <a class="btn btn-primary mb-4" th:href="@{/employee/new}">Nuevo Empleado</a>
            <a class="btn btn-outline-secondary mb-4" th:href="@{/employee/list}">Limpiar</a>
            <div th:if="${msg!= null}" th:text="${msg}" class="alert alert-success" role="alert"></div>
            <table class="table table-sm table-striped align-middle">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Puesto</th>
                        <th>Departamento</th>
                        <th>Ciudad</th>
                        <th></th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="employee, info : ${employeeList}">
                        <td th:text="${info.index + 1}"></td>
                        <td th:text="${employee.firstName}"></td>
                        <td th:text="${employee.lastName}"></td>
                        <td th:text="${employee.jobId != null ? employee.jobId.jobTitle : '-'}"></td>
                        <td th:text="${employee.departmentId != null ? employee.departmentId.departmentName : '-'}">
                        </td>
                        <td
                            th:text="${employee.departmentId != null and employee.departmentId.locationId != null ? employee.departmentId.locationId.city : '-'}">
                        </td>
                        <td><a class="btn btn-primary"
                                th:href="@{/employee/edit/{id}(id=${employee.employeeId})}">Editar</a>
                        </td>
                        <td><a class="btn btn-danger"
                                th:href="@{/employee/delete/{id}(id=${employee.employeeId})}">Borrar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</body>

</html>
