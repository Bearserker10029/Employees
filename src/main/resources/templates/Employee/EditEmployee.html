<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Editar Empleado</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>

<body>
    <main>
        <div class="container px-4 py-5">
            <h1 class="pb-2 mb-4 border-bottom">Editar Empleado</h1>
            <form method="post" th:action="@{/employee/save}" th:object="${employee}" class="col-6">
                <input th:field="*{employeeId}" type="hidden" />

                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="firstName" class="form-label">Nombre</label>
                            <input th:field="*{firstName}" type="text" class="form-control"
                                id="firstName" />
                            <div class="text-danger" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="lastName" class="form-label">Apellido</label>
                            <input th:field="*{lastName}" type="text" class="form-control"
                                id="lastName" required />
                            <div class="text-danger" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="email" class="form-label">Correo Electrónico</label>
                            <input th:field="*{email}" type="email" class="form-control"
                                id="email" required />
                            <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="salary" class="form-label">Sueldo</label>
                            <input th:field="*{salary}" type="number" step="0.01"
                                class="form-control" id="salary" />
                            <div class="text-danger" th:if="${#fields.hasErrors('salary')}" th:errors="*{salary}"></div>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="jobId" class="form-label">Puesto</label>
                            <select class="form-control" id="jobId" name="jobId">
                                <option value="">-- Seleccionar --</option>
                                <option th:each="job : ${jobs}" th:value="${job.jobId}" th:text="${job.jobTitle}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="managerId" class="form-label">Jefe</label>
                            <select class="form-control" id="managerId" name="managerId">
                                <option value="">-- Seleccionar --</option>
                                <option th:each="manager : ${managers}" th:value="${manager.employeeId}"
                                    th:text="${manager.firstName} + ' ' + ${manager.lastName}"></option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="departmentId" class="form-label">Departamento</label>
                            <select class="form-control" id="departmentId" name="departmentId">
                                <option value="">-- Seleccionar --</option>
                                <option th:each="dept : ${departments}" th:value="${dept.departmentId}"
                                    th:text="${dept.departmentName}"></option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="mt-4">
                    <a th:href="@{/employee/list}" class="btn btn-danger">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Actualizar</button>
                </div>
            </form>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</body>

</html>
